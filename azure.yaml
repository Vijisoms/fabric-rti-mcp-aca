# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: fabric-rti-mcp-containerapp
metadata:
  template: fabric-rti-mcp-containerapp@1.0.0

infra:
  provider: bicep
  path: ./infra
  module: main-containerapp

services:
  mcp:
    project: .
    language: python
    host: containerapp
    docker:
      path: ./Dockerfile
      remoteBuild: true
